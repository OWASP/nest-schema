name: OWASP Schema CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}

env:
  FORCE_COLOR: 1

jobs:
  pre-commit:
    name: Run pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          cache: poetry
          cache-dependency-path: poetry.lock
          python-version: '3.14'

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (echo 'Unstaged changes detected. \
          Run `make check` and use `git add` to address it.' && exit 1)

  code-ql:
    name: CodeQL
    permissions:
      security-events: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language:
          - python
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: /language:${{ matrix.language }}

  run-tests:
    name: Run tests (Python ${{ matrix.python-version }})
    needs:
      - pre-commit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - '3.13'
          - '3.14'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Build test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}
          cache-from: |
            type=gha,scope=py${{ matrix.python-version }}
            type=registry,ref=owasp/nest:test-owasp-schema-cache-py${{ matrix.python-version }}
          cache-to: |
            type=gha,compression=zstd,scope=py${{ matrix.python-version }}
          context: .
          file: docker/Dockerfile.test
          load: true
          platforms: linux/amd64
          tags: owasp/nest:test-owasp-schema-py${{ matrix.python-version }}

      - name: Run tests
        run: |
          docker run --rm owasp/nest:test-owasp-schema-py${{ matrix.python-version }} pytest

  publish-schema-package:
    name: Publish to PyPI
    needs:
      - code-ql
      - run-tests
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pipx install poetry

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PACKAGE_VERSION=$(poetry version --short)

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Version mismatch: tag is '$TAG_VERSION' but pyproject.toml has '$PACKAGE_VERSION'"
            exit 1
          fi
          echo "Version validated: $PACKAGE_VERSION"

      - name: Install dependencies
        run: poetry install

      - name: Build package
        run: make build-package

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          skip-existing: true
